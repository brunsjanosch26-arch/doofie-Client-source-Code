name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS-Setup (wie bisher)
          - platform: windows-latest
            args: ""
          # macOS: Universal-DMG (Intel + Apple Silicon in einer Datei)
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles dmg"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS: beide Architekturen fuer den Universal-Build
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Set version
        run: node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version='2.0.${{ github.run_number }}'; fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2));"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v2.0.${{ github.run_number }}
          releaseName: "Doofie Client v2.0.${{ github.run_number }}"
          args: ${{ matrix.args }}
          releaseBody: |
            ## Doofie Client v2.0.${{ github.run_number }}

            ### Downloads
            - **Windows**: `Doofie.Client_*_x64-setup.exe`
            - **macOS** (Intel + Apple Silicon): `Doofieclient_*_universal.dmg`

            ### Voraussetzungen
            - Windows 10/11 **oder** macOS 10.15+
            - Java 21 (wird vom Launcher automatisch gefunden)
            - Microsoft Minecraft-Account oder Offline-Modus
            - **Kein Admin-Konto nötig** — der Windows-Installer installiert nur für den aktuellen Benutzer (`currentUser`-Modus), keine UAC-Erhöhung erforderlich.

            ### "Windows hat den Start dieser App geschützt" / Datei wird blockiert (z.B. Schul-Laptop)
            Der Installer ist nicht mit einem kostenpflichtigen Zertifikat signiert, daher stuft SmartScreen ihn als unbekannt ein. Das ist **keine Warnung vor echter Schadsoftware** — nur fehlende Signatur-Reputation. So umgehst du es ohne Admin-Rechte:
            1. Rechtsklick auf die heruntergeladene `.exe` → **Eigenschaften**
            2. Ganz unten bei "Sicherheit": Häkchen bei **"Zulassen"** setzen → OK
            3. Installer normal per Doppelklick starten

            Alternativ in PowerShell (ohne Admin-Rechte):
            ```
            Unblock-File "$env:USERPROFILE\Downloads\Doofie.Client_*_x64-setup.exe"
            ```

            Falls dein Schul-Laptop per Richtlinie *jede* unsignierte Anwendung hart blockiert (kein "Trotzdem ausführen" verfügbar), hilft nur eine Freigabe durch die Schul-IT — das lässt sich clientseitig nicht umgehen.

            ### macOS: "App ist beschädigt" / kann nicht geöffnet werden
            Die App ist nicht mit einem Apple-Developer-Zertifikat signiert, daher blockiert Gatekeeper sie zunächst. So öffnest du sie trotzdem:
            1. `.dmg` öffnen und `Doofieclient` in den **Programme**-Ordner ziehen
            2. Im Terminal einmalig: `xattr -cr /Applications/Doofieclient.app`
            3. Danach normal per Doppelklick starten

            (Alternativ: Rechtsklick auf die App → **Öffnen** → im Dialog nochmal "Öffnen" — je nach macOS-Version reicht das schon.)
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
