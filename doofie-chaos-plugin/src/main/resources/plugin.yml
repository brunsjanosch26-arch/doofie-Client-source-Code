name: DoofieChaos
version: '${version}'
main: de.doofie.chaos.ChaosPlugin
api-version: '26.2'
author: Doofie
description: Chaos-Events — alle 15 Minuten wuerfelt der Server ein Zufalls-Event

commands:
  chaos:
    description: Chaos-Befehle
    usage: "/chaos [status|jetzt|item]"
  tpa:
    description: Teleport-Anfrage an einen Spieler (ich zu dir)
    usage: "/tpa <spieler> — dann /tpaccept oder /tpadeny"
    aliases: [tpask]
  tpahere:
    description: Teleport-Anfrage an einen Spieler (du zu mir)
    usage: /tpahere <spieler>
  tpaccept:
    description: Offene Teleport-Anfrage annehmen
    usage: /tpaccept
    aliases: [tpaannehmen]
  tpadeny:
    description: Offene Teleport-Anfrage ablehnen
    usage: /tpadeny
    aliases: [tpaablehnen]
  tpaauto:
    description: TPA-Anfragen automatisch annehmen (an/aus)
    usage: /tpaauto
  lobby:
    description: Zurueck in die Netzwerk-Lobby
    usage: /lobby
    aliases: [hub, l]

permissions:
  doofie.chaos.admin:
    description: Erlaubt /chaos jetzt und /chaos item
    default: op
