name: DoofieBossraid
version: '${version}'
main: de.doofie.bossraid.BossraidPlugin
api-version: '26.2'
author: Doofie
description: Boss-Raids — alle 2 Stunden ein Welt-Boss mit Schadens-Ranking und Seelen-Loot

commands:
  raid:
    description: Boss-Raid-Befehle
    usage: "/raid [status|top|item]"
  tpa:
    description: Teleport-Anfrage an einen Spieler (ich zu dir)
    usage: "/tpa <spieler> — dann /tpaccept oder /tpadeny"
    aliases: [tpask]
  tpahere:
    description: Teleport-Anfrage an einen Spieler (du zu mir)
    usage: /tpahere <spieler>
  tpaccept:
    description: Offene Teleport-Anfrage annehmen
    usage: /tpaccept
    aliases: [tpaannehmen]
  tpadeny:
    description: Offene Teleport-Anfrage ablehnen
    usage: /tpadeny
    aliases: [tpaablehnen]
  tpaauto:
    description: TPA-Anfragen automatisch annehmen (an/aus)
    usage: /tpaauto
  lobby:
    description: Zurueck in die Netzwerk-Lobby
    usage: /lobby
    aliases: [hub, l]

permissions:
  doofie.bossraid.admin:
    description: Erlaubt /raid item
    default: op
