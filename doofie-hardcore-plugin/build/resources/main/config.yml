# ─── Bounty SMP Plugin ───────────────────────────────
# Waehrung: Dollar ($)

# Startguthaben fuer neue Spieler
start-guthaben: 500.0

# Mindest-Kopfgeld in Dollar
min-kopfgeld: 100.0

# Aufschlag beim Freikaufen (0.05 = 5% mehr als das Kopfgeld)
freikauf-aufschlag: 0.05

# Aufschlag fuer Server-Angebote im Auktionshaus (0.05 = 5% teurer als der Verkaufspreis)
ah-aufschlag: 0.05

# Server-Angebote im /ah nach Kategorie (unbegrenzter Vorrat,
# Preis = Verkaufspreis + Aufschlag). Kategorien: starter, pvp, bauen,
# essen, redstone, werkzeug. Ohne Eintrag greift das eingebaute
# Standard-Sortiment der jeweiligen Kategorie — hier kann man es ueberschreiben:
# ah-kategorien:
#   starter:
#     - BREAD
#     - TORCH
#   pvp:
#     - DIAMOND_SWORD

# Preise der Legendaer-Kategorie (Custom-Items, Server-Verkauf).
# Standard: doener 2500, goetterspeer 70000 — hier ueberschreibbar:
# ah-legendaer:
#   doener: 2500.0
#   goetterspeer: 70000.0

# Kopf-Trophaee: Anteil des Kopfgelds als Verkaufswert des gedroppten Kopfes
kopf-bonus: 0.10

# Kopfgeldjaeger-Kompass
jagd-kosten: 50.0
jagd-dauer-sekunden: 60
jagd-cooldown-sekunden: 300

# Taegliche Belohnung
daily-belohnung: 100.0
daily-streak-belohnung: 500.0

# Lotterie (Ziehung jede Stunde)
lotto-ticket-preis: 50.0

# Bounty-Schutz
schutz-kosten: 2000.0
schutz-dauer-minuten: 30

# Season-Pass Premium-Upgrade
pass-premium-kosten: 5000.0

# Zufalls-Teleport
rtp-cooldown-sekunden: 300
rtp-radius: 2000

# Kosten fuer eine Gildengruendung
gilde-kosten: 5000.0

# Maximale Anzahl Auktionen pro Spieler
max-auktionen-pro-spieler: 5

# Preis-Overrides (Material -> Dollar pro Stueck).
# WICHTIG: JEDES Item hat automatisch einen passenden Verkaufswert (Preis-Engine im Plugin).
