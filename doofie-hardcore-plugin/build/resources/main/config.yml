# ─── Doofie Hardcore Plugin ───────────────────────────────
# Waehrung: Dollar ($)

# Startguthaben fuer neue Spieler
start-guthaben: 500.0

# Mindest-Kopfgeld in Dollar
min-kopfgeld: 100.0

# Aufschlag beim Freikaufen (0.05 = 5% mehr als das Kopfgeld)
freikauf-aufschlag: 0.05

# Aufschlag fuer Server-Angebote im Auktionshaus (0.05 = 5% teurer als der Verkaufspreis)
ah-aufschlag: 0.05

# Dauerhafte Server-Angebote im /ah (unbegrenzter Vorrat, Preis = Verkaufspreis + Aufschlag)
# Nur Materialien mit einem Eintrag unter 'preise' werden angezeigt
ah-startangebot:
  - WHEAT
  - CARROT
  - POTATO
  - PORKCHOP
  - BEEF
  - CHICKEN
  - COD
  - SALMON
  - OAK_LOG
  - COBBLESTONE
  - COAL
  - IRON_INGOT
  - ARROW
  - STRING
  - LEATHER
  - BONE

# Maximale Anzahl Auktionen pro Spieler
max-auktionen-pro-spieler: 5

# Verkaufspreise fuer /sell (Material -> Dollar pro Stueck)
# Alle Material-Namen: https://jd.papermc.io/paper/26.2/org/bukkit/Material.html
preise:
