name: DoofieHardcore
version: '${version}'
main: de.doofie.hardcore.HardcorePlugin
api-version: '26.2'
author: Doofie
description: Kopfgeld, Sell-System, Auktionshaus und Bann-Freikauf fuer das Bounty SMP

commands:
  money:
    description: Zeigt dein Guthaben
    usage: /money [spieler]
    aliases: [geld, balance, bal]
  pay:
    description: Geld an einen Spieler senden
    usage: /pay <spieler> <betrag>
  sell:
    description: Oeffnet das Verkaufsmenue
    usage: /sell
    aliases: [verkaufen]
  kopfgeld:
    description: Kopfgeld auf einen Spieler setzen oder anzeigen
    usage: "/kopfgeld <spieler> <betrag> — oder /kopfgeld liste"
    aliases: [bounty]
  freikaufen:
    description: Dich oder einen gebannten Spieler freikaufen (Kopfgeld + 5%)
    usage: /freikaufen [spieler]
    aliases: [unbanme]
  ah:
    description: Auktionshaus oeffnen oder Item einstellen
    usage: /ah [sell <preis>]
    aliases: [auktion, auctionhouse]
  jagd:
    description: Kompass zeigt auf ein Kopfgeld-Ziel
    usage: /jagd <spieler>
    aliases: [hunt]
  top:
    description: Ranglisten anzeigen
    usage: /top <geld|kills|kopfgelder>
    aliases: [leaderboard]
  daily:
    description: Taegliche Belohnung abholen
    usage: /daily
    aliases: [taeglich]
  lotto:
    description: Lotterie-Status oder Tickets kaufen
    usage: /lotto [kaufen [anzahl]]
    aliases: [lotterie]
  duell:
    description: Duell mit Einsatz
    usage: "/duell <spieler> <einsatz> — oder /duell annehmen"
    aliases: [duel]
  schutz:
    description: Zeitweise Immunitaet gegen den Kopfgeld-Bann kaufen
    usage: /schutz
    aliases: [protection]
  quests:
    description: Deine Tagesauftraege anzeigen
    usage: /quests
    aliases: [auftraege]
  tpa:
    description: Teleport-Anfrage an einen Spieler (ich zu dir)
    usage: "/tpa <spieler> — dann /tpaccept oder /tpadeny"
    aliases: [tpask]
  tpahere:
    description: Teleport-Anfrage an einen Spieler (du zu mir)
    usage: /tpahere <spieler>
  tpaccept:
    description: Offene Teleport-Anfrage annehmen
    usage: /tpaccept
    aliases: [tpaannehmen]
  tpadeny:
    description: Offene Teleport-Anfrage ablehnen
    usage: /tpadeny
    aliases: [tpaablehnen]
  tpaauto:
    description: TPA-Anfragen automatisch annehmen (an/aus)
    usage: /tpaauto
  gilde:
    description: Gilden-System
    usage: "/gilde gruenden|einladen|beitreten|verlassen|kasse|krieg|chat|liste"
    aliases: [guild, clan]
  boerse:
    description: Der Doofie-Aktienmarkt
    usage: "/boerse [kaufen|verkaufen <firma> <anzahl>]"
    aliases: [aktien, boersen]
  wette:
    description: Auf ein laufendes Duell wetten
    usage: /wette <spieler> <betrag>
    aliases: [bet]
  auftrag:
    description: Anonymes Kopfgeld setzen (+20% Gebuehr)
    usage: /auftrag <spieler> <betrag>
    aliases: [assassine]
  gerichtsduell:
    description: Als Gebannter den Killer um die Freiheit fordern
    usage: "/gerichtsduell — oder /gerichtsduell annehmen"
  testament:
    description: Erben festlegen
    usage: /testament <spieler>
  events:
    description: Aktuelles Weltevent anzeigen
    usage: /events
  hilfe:
    description: Das Doofie-Handbuch oeffnen
    usage: /hilfe
    aliases: [help2, handbuch]
  rtp:
    description: Zufaelliger sicherer Teleport
    usage: "/rtp [overworld|nether|end] — nur bereiste Dimensionen"
    aliases: [wild]
  sidebar:
    description: Stats-Sidebar ein-/ausblenden
    usage: /sidebar
    aliases: [scoreboard, stats]
  pass:
    description: Season-Pass anzeigen oder Premium kaufen
    usage: "/pass [premium]"
  statistik:
    description: Spieler-Statistik anzeigen
    usage: "/statistik [spieler]"
    aliases: [stat]
  zone:
    description: Friedenszone erstellen (Admin)
    usage: "/zone [radius]"
    permission: doofie.invsee
  invsee:
    description: Fremdes Inventar einsehen (Admin)
    usage: "/invsee <spieler> [ender]"
    permission: doofie.invsee
  doofieitem:
    description: Custom-Items vergeben (Admin)
    usage: "/doofieitem give <spieler> <doener|speer>"
    permission: doofie.items
    aliases: [citem]

permissions:
  doofie.invsee:
    description: Erlaubt /invsee
    default: op
  doofie.items:
    description: Erlaubt /doofieitem (Custom-Items vergeben)
    default: op
