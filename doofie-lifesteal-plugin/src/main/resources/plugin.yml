name: DoofieLifesteal
version: '${version}'
main: de.doofie.lifesteal.LifestealPlugin
api-version: '26.2'
author: Doofie
description: Lifesteal-Modus mit Custom Items — Herzen stehlen, craften, auszahlen und Freunde wiederbeleben

commands:
  herzen:
    description: Zeigt deine (oder fremde) Herzen
    usage: /herzen [spieler]
    aliases: [hearts, hp]
  auszahlen:
    description: Eigene Herzen als Herz-Items auszahlen
    usage: /auszahlen [anzahl]
    aliases: [withdraw]
  revive:
    description: Eliminierten Spieler wiederbeleben (nur Admins)
    usage: /revive <spieler>
    aliases: [wiederbeleben]
  eliminiert:
    description: Liste aller eliminierten Spieler
    usage: /eliminiert
    aliases: [eliminated]
  lifestealitem:
    description: Custom-Items vergeben (Admin)
    usage: "/lifestealitem give <spieler> <herz|herz_fragment|lifesteal_schwert> [anzahl]"
    permission: doofie.lifesteal.items
    aliases: [lsitem]
  tpa:
    description: Teleport-Anfrage an einen Spieler (ich zu dir)
    usage: "/tpa <spieler> — dann /tpaccept oder /tpadeny"
    aliases: [tpask]
  tpahere:
    description: Teleport-Anfrage an einen Spieler (du zu mir)
    usage: /tpahere <spieler>
  tpaccept:
    description: Offene Teleport-Anfrage annehmen
    usage: /tpaccept
    aliases: [tpaannehmen]
  tpadeny:
    description: Offene Teleport-Anfrage ablehnen
    usage: /tpadeny
    aliases: [tpaablehnen]
  tpaauto:
    description: TPA-Anfragen automatisch annehmen (an/aus)
    usage: /tpaauto
  lobby:
    description: Zurueck in die Netzwerk-Lobby
    usage: /lobby
    aliases: [hub, l]

permissions:
  doofie.lifesteal.items:
    description: Erlaubt /lifestealitem (Custom-Items vergeben)
    default: op
  doofie.lifesteal.admin:
    description: /revive nutzen, Herzen setzen
    default: op
