name: DoofieLobby
version: '${version}'
main: de.doofie.lobby.LobbyPlugin
api-version: '26.2'
author: Doofie
description: Netzwerk-Lobby — Modus-Kompass mit GUI, schickt Spieler ueber Velocity auf die Spielmodi

commands:
  duel:
    description: 1v1-Duell — waehle dein Kit
    usage: "/duel <sword|uhc>"
    aliases: [duell, 1v1]
  duellannehmen:
    description: Duell-Anfrage annehmen
    usage: /duellannehmen
  duellablehnen:
    description: Duell-Anfrage ablehnen
    usage: /duellablehnen
  schemplatz:
    description: WorldEdit-Schematic (.schem) an deiner Position platzieren (Admin)
    usage: "/schemplatz <datei>"
    permission: doofie.lobby.schem
    aliases: [pasteschem]

permissions:
  doofie.lobby.schem:
    description: Erlaubt /schemplatz
    default: op
